<head>

     crossorigin="anonymous"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Free M-Pesa, Loan, HELB and Chama calculators in Kenya. Smart financial tools to help you plan better.">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    nav {
      background: #0f9d58;
      padding: 15px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: white;
    }

    .section {
      max-width: 600px;
      margin: 30px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #0f9d58;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0f9d58;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0c7c45;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;

    footer {
      background: #0f9d58;

      margin-top: 40px;

<body>

 <nav>
  <a href="index.html">Home</a>
  <a href="Blog.html">Blog</a>
  <a href="About.html">About</a>
  <a href="Privacy.html">Privacy</a>

<header id="home">
  <h1>Kenya Smart Money Calculators</h1>
  <p>Free Financial Calculators for Smart Money Decisions</p>
</header>

<!-- CALCULATORS -->
<div class="section" id="calculators">
  <h2>M-Pesa Charges Calculator</h2>
  <input type="number" id="mpesaAmount" placeholder="Enter Amount (KES)">
  <button onclick="calculateMpesa()">Calculate</button>
  <div class="result" id="mpesaResult"></div>
</div>

<div class="section">
  <h2>Loan Calculator</h2>
  <input type="number" id="loanAmount" placeholder="Loan Amount (KES)">
  <input type="number" id="interestRate" placeholder="Interest Rate (%)">
  <input type="number" id="loanYears" placeholder="Loan Period (Years)">
  <button onclick="calculateLoan()">Calculate</button>
  <div class="result" id="loanResult"></div>
</div>

<div class="section">
  <h2>Chama Savings Calculator</h2>
  <input type="number" id="monthlyContribution" placeholder="Monthly Contribution (KES)">
  <input type="number" id="months" placeholder="Number of Months">
  <button onclick="calculateChama()">Calculate</button>
  <div class="result" id="chamaResult"></div>
</div>

<div class="section">
  <h2>HELB Repayment Estimator</h2>
  <input type="number" id="helbAmount" placeholder="Total HELB Loan (KES)">
  <input type="number" id="helbInterest" placeholder="Interest Rate (%)">
  <button onclick="calculateHelb()">Calculate</button>
  <div class="result" id="helbResult"></div>
</div>

<footer>
  © 2026 Kenya Smart Money Calculators Kenya | Independent Financial Tools Website
</footer>

<script>
function calculateMpesa() {
  let amount = parseFloat(document.getElementById("mpesaAmount").value);
  let charge = 0;

  if (amount <= 100) charge = 0;
  else if (amount <= 500) charge = 7;
  else if (amount <= 1000) charge = 13;
  else if (amount <= 1500) charge = 23;
  else if (amount <= 2500) charge = 33;
  else if (amount <= 3500) charge = 53;
  else if (amount <= 5000) charge = 57;
  else if (amount <= 7500) charge = 78;
  else if (amount <= 10000) charge = 90;
  else if (amount <= 15000) charge = 100;
  else if (amount <= 20000) charge = 105;
  else charge = 108;

  document.getElementById("mpesaResult").innerHTML =
    "Transaction Charge: KES " + charge +
    "<br>Total Deducted: KES " + (amount + charge);
}

function calculateLoan() {
  let P = parseFloat(document.getElementById("loanAmount").value);
  let r = parseFloat(document.getElementById("interestRate").value) / 100 / 12;
  let n = parseFloat(document.getElementById("loanYears").value) * 12;
  let monthly = (P * r) / (1 - Math.pow(1 + r, -n));
  document.getElementById("loanResult").innerHTML =
    "Monthly Payment: KES " + monthly.toFixed(2);
}

function calculateChama() {
  let c = parseFloat(document.getElementById("monthlyContribution").value);
  let m = parseFloat(document.getElementById("months").value);
  document.getElementById("chamaResult").innerHTML =
    "Total Savings: KES " + (c * m).toFixed(2);
}

function calculateHelb() {
  let a = parseFloat(document.getElementById("helbAmount").value);
  let i = parseFloat(document.getElementById("helbInterest").value) / 100;
  document.getElementById("helbResult").innerHTML =
    "Estimated Total Repayment: KES " + (a + (a * i)).toFixed(2);
}
</script>

</body>
